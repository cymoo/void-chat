server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Match backend MAX_REQUEST_SIZE (30 MB)
    client_max_body_size 30m;

    # Gzip compression for text-based assets
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/javascript text/xml
        application/javascript application/json application/xml
        image/svg+xml;

    # Vite hashes all asset filenames → cache for 1 year
    # ^~ prevents the regex engine from also checking /uploads/ paths
    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # Use Docker's embedded DNS resolver for dynamic upstream lookup
    resolver 127.0.0.11 valid=30s;
    set $backend http://backend:8000;

    # REST API proxy
    location /api/ {
        proxy_pass $backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # WebSocket proxy (chat)
    location /chat/ {
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_read_timeout 3600s;
    }

    # Uploaded files proxy
    location /uploads/ {
        proxy_pass $backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — no-cache so clients always fetch the latest index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
        add_header X-Frame-Options        "SAMEORIGIN"      always;
        add_header X-Content-Type-Options "nosniff"         always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    }
}
