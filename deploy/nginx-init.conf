# Temporary HTTP-only config used during initial TLS certificate setup.
# Once certbot obtains the certificate, this is replaced by nginx.conf.
server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
