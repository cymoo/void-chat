# Production compose — no frontend container.
# Host nginx serves the React SPA and proxies to the backend.
# Use via: make setup / make deploy (see deploy/README.md)
name: void-chat

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: void_chat
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d void_chat"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      COLLEEN_ENV: prod
      DATABASE_URL: jdbc:postgresql://postgres:5432/void_chat
      DATABASE_USER: ${DB_USER:-postgres}
      DATABASE_PASSWORD: ${DB_PASSWORD}
      REDIS_URL: redis://redis:6379
      SERVER_PORT: "8000"
      UPLOAD_DIR: /app/uploads
      MAX_REQUEST_SIZE: "31457280"
      MAX_IMAGE_SIZE: "5242880"
      MAX_FILE_SIZE: "20971520"
      SESSION_TTL_DAYS: "${SESSION_TTL_DAYS:-7}"
      INIT_ADMIN_USERNAME: "${INIT_ADMIN_USERNAME:-}"
      INIT_ADMIN_PASSWORD: "${INIT_ADMIN_PASSWORD:-}"
      PERSONA_LLM_API_KEY: "${PERSONA_LLM_API_KEY:-}"
      PERSONA_LLM_BASE_URL: "${PERSONA_LLM_BASE_URL:-}"
      PERSONA_LLM_MODEL: "${PERSONA_LLM_MODEL:-}"
      PERSONA_AUTO_ENGAGE: "${PERSONA_AUTO_ENGAGE:-false}"
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - uploads:/app/uploads
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/auth/registration-mode"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  postgres_data:
  redis_data:
  uploads:
